# =============================================================
# Compliance Response Server — Kubernetes Manifests
# =============================================================
# Namespace → RBAC → Deployment → Service
# =============================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: compliance-system
  labels:
    app.kubernetes.io/part-of: compliance-platform

---
# ServiceAccount for Response Server
apiVersion: v1
kind: ServiceAccount
metadata:
  name: response-server
  namespace: compliance-system
  labels:
    app: response-server
    app.kubernetes.io/part-of: compliance-platform

---
# ClusterRole — needs to create NetworkPolicies and read Pods
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: compliance-response-server
  labels:
    app: response-server
    app.kubernetes.io/part-of: compliance-platform
rules:
  # Create/delete NetworkPolicies for auto-isolation
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "delete", "get", "list"]
  # Read Pod metadata (labels) for NetworkPolicy targeting
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Read namespaces for filtering
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]

---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: compliance-response-server
  labels:
    app: response-server
    app.kubernetes.io/part-of: compliance-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: compliance-response-server
subjects:
  - kind: ServiceAccount
    name: response-server
    namespace: compliance-system

---
# ConfigMap for environment configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: response-server-config
  namespace: compliance-system
  labels:
    app: response-server
data:
  SERVER_PORT: "5000"
  AUTO_ISOLATE: "true"
  LOG_LEVEL: "INFO"
  EVENT_STORE_SIZE: "2000"
  # AI_ENDPOINT: Set this when AI module (이온) is ready
  # Example: "http://ai-classifier.compliance-system.svc.cluster.local:8000/classify"
  AI_ENDPOINT: ""
  AI_TIMEOUT: "5"
  # Falco 침묵 탐지: N초 동안 이벤트 없으면 CRITICAL 경보
  # falco-watchdog 타이머가 30초 간격이므로 90초(3회 미수신)로 설정
  HEARTBEAT_SILENCE_THRESHOLD: "90"
  # 침묵 감지 체크 주기 (초)
  HEARTBEAT_CHECK_INTERVAL: "30"
  # ── Webhook 보안 설정 ─────────────────────────────────
  # WEBHOOK_SECRET은 별도 Secret 오브젝트에서 주입 (아래 webhook-secret 참조)
  # HMAC 서명 없는 요청을 거부 (Hard Mode)
  WEBHOOK_HMAC_REQUIRED: "true"
  # 허용 소스 IP (CIDR 가능). 서명 프록시가 X-Forwarded-For: 127.0.0.1 추가.
  WEBHOOK_IP_WHITELIST: "127.0.0.1,::1"
  # IP당 burst 허용 요청 수 (토큰 버킷 초기 용량)
  RATE_LIMIT_CAPACITY: "100"
  # IP당 초당 토큰 충전 속도 (지속 허용 RPS)
  RATE_LIMIT_REFILL_RATE: "3.0"
  # ── REST API / Heartbeat 인증 설정 ───────────────────
  # [HIGH #6] CORS 허용 오리진 (쉼표 구분). 와일드카드(*) 대신 명시적 오리진만 허용.
  # Grafana 대시보드 주소로 변경할 것.
  ALLOWED_ORIGINS: "http://localhost:3000"

---
# =============================================================
# 인증 Secret — 모든 토큰은 배포 전 반드시 실제 값으로 주입할 것
# 절대 이 파일에 실제 값을 커밋하지 말 것 (.gitignore에 추가 권장)
#
# 생성 명령:
#   kubectl create secret generic webhook-secret \
#     --from-literal=WEBHOOK_SECRET=$(openssl rand -hex 32) \
#     --from-literal=HEARTBEAT_TOKEN=$(openssl rand -hex 32) \
#     --from-literal=API_TOKEN=$(openssl rand -hex 32) \
#     -n compliance-system --dry-run=client -o yaml | kubectl apply -f -
#
# [CRITICAL #2] WEBHOOK_SECRET이 빈 값이면 서버 시작 시 503 반환
# [HIGH #4]     HEARTBEAT_TOKEN이 빈 값이면 heartbeat 엔드포인트 503 반환
# [HIGH #5]     API_TOKEN이 빈 값이면 DELETE /api/v1/isolations 503 반환
# =============================================================
apiVersion: v1
kind: Secret
metadata:
  name: webhook-secret
  namespace: compliance-system
  labels:
    app: response-server
    app.kubernetes.io/part-of: compliance-platform
type: Opaque
stringData:
  # Falco Sidekick → Response Server HMAC 서명 검증 키
  WEBHOOK_SECRET: ""        # 반드시 실제 값으로 교체 (openssl rand -hex 32)
  # POST /api/v1/heartbeat X-Watchdog-Token 인증 토큰
  HEARTBEAT_TOKEN: ""       # 반드시 실제 값으로 교체 (openssl rand -hex 32)
  # DELETE /api/v1/isolations Bearer 인증 토큰
  API_TOKEN: ""             # 반드시 실제 값으로 교체 (openssl rand -hex 32)

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: response-server
  namespace: compliance-system
  labels:
    app: response-server
    app.kubernetes.io/part-of: compliance-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: response-server
  template:
    metadata:
      labels:
        app: response-server
        app.kubernetes.io/part-of: compliance-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: response-server
      containers:
        - name: response-server
          image: compliance-response-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: response-server-config
            - secretRef:
                name: webhook-secret
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000  
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

---
# Service — ClusterIP (Sidekick connects internally)
apiVersion: v1
kind: Service
metadata:
  name: response-server
  namespace: compliance-system
  labels:
    app: response-server
    app.kubernetes.io/part-of: compliance-platform
spec:
  type: ClusterIP
  selector:
    app: response-server
  ports:
    - name: http
      port: 5000
      targetPort: http
      protocol: TCP

# NodePort debug service는 제거됨 — 외부 접근이 필요한 경우
# kubectl port-forward 를 사용할 것:
#   kubectl port-forward -n compliance-system svc/response-server 5000:5000
