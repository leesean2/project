# =============================================================
# Prometheus Scrape Config — Response Server Integration
# =============================================================
# Add this to Prometheus configuration to scrape
# Response Server custom metrics.
#
# If using kube-prometheus-stack Helm chart, add as
# additionalScrapeConfigs in values.yaml.
# =============================================================

# Option 1: Direct scrape config (add to prometheus.yml)
scrape_configs:
  - job_name: "compliance-response-server"
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - compliance-system
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: response-server
        action: keep
      # 1차: pod_ip:5000 고정 (response-server 기본 메트릭 포트)
      - source_labels: [__meta_kubernetes_pod_ip]
        target_label: __address__
        replacement: "${1}:5000"
      # 2차: prometheus.io/port 어노테이션이 있으면 pod_ip:annotation_port 로 덮어씀
      - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
        separator: ":"
        regex: '(.+):(\d+)'
        target_label: __address__
        replacement: '$1:$2'
      # 커스텀 메트릭 경로 어노테이션 지원
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        regex: '(.+)'
        target_label: __metrics_path__
        replacement: '$1'

  # Falco Sidekick metrics (auto-exposed)
  - job_name: "falco-sidekick"
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - falco
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
        regex: falcosidekick
        action: keep
      - source_labels: [__meta_kubernetes_pod_ip]
        target_label: __address__
        replacement: "${1}:2801"

---
# Option 2: ServiceMonitor (if using Prometheus Operator)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: compliance-response-server
  namespace: compliance-system
  labels:
    app: response-server
    app.kubernetes.io/part-of: compliance-platform
spec:
  selector:
    matchLabels:
      app: response-server
  endpoints:
    - port: http
      interval: 15s
      path: /metrics
  namespaceSelector:
    matchNames:
      - compliance-system
